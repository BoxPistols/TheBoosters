name: Release (The Boosters — full/legacy app)

# Builds the full-featured app (browser/ + lib/, Electron 28) into installers on
# macOS (dmg/zip arm64+x64) and Windows (nsis) and publishes them to a GitHub
# Release. This is the primary "The Boosters" product (io.boxpistols.theboosters).
# The modern app/ shell ("The Boosters Next", io.boxpistols.theboosters.next)
# ships separately via release.yml on `app-v*` tags.
#
# Trigger by pushing a tag like `v0.16.1` (the `v*` glob does NOT match `app-v*`):
#   git tag v0.16.1 && git push origin v0.16.1
#
# Builds are currently UNSIGNED (no code-signing certificates configured), so
# macOS/Windows warn on first launch — see the README for the quarantine /
# SmartScreen workaround. Add APPLE_* / WIN_CSC_* secrets and wire them here to
# ship signed + notarized artifacts. No untrusted event input is referenced in
# any run: step; GITHUB_TOKEN is a repo secret.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build & publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        # Reads the pnpm version from package.json "packageManager".
        uses: pnpm/action-setup@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Rewrite git:// to https://
        # A transitive dependency (eve, via Raphael/snap.svg) is referenced over
        # the unauthenticated git:// protocol, which GitHub disabled in 2022.
        run: git config --global url."https://github.com/".insteadOf "git://github.com/"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer (Vite production)
        # Produces compiled/main.js.
        run: pnpm run compile

      - name: Package (unpacked, for pre-publish verification)
        # Fast --dir build so the packaged app (devDependencies pruned) can be
        # verified BEFORE anything is published.
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: pnpm exec electron-builder --dir

      - name: Verify packaged runtime imports
        # Every bare runtime import in the bundle must resolve inside the
        # packaged node_modules (catches deps wrongly placed in devDependencies).
        run: node scripts/check-packaged-requires.mjs

      - name: E2E on packaged app (macOS)
        if: runner.os == 'macOS'
        # Boots the actual packaged .app and drives the real UI: create note →
        # type → save → note-list title. Publishing is gated on this passing.
        run: |
          APP="$(find release -maxdepth 2 -name 'The Boosters.app' -print -quit)"
          test -n "$APP" || { echo "packaged app not found"; exit 1; }
          set +e
          TB_E2E_PROBE="$PWD/dev-scripts/e2e-probe.js" \
          TB_E2E_RESULT="$RUNNER_TEMP/tb-e2e.json" \
            "$APP/Contents/MacOS/The Boosters"
          CODE=$?
          set -e
          cat "$RUNNER_TEMP/tb-e2e.json" || true
          exit $CODE

      - name: E2E on packaged app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = "release\win-unpacked\The Boosters.exe"
          if (-not (Test-Path $exe)) { throw "packaged app not found" }
          $env:TB_E2E_PROBE = "$PWD\dev-scripts\e2e-probe.js"
          $env:TB_E2E_RESULT = "$env:RUNNER_TEMP\tb-e2e.json"
          $p = Start-Process -FilePath $exe -Wait -PassThru
          Get-Content $env:TB_E2E_RESULT -ErrorAction SilentlyContinue
          if ($p.ExitCode -ne 0) { throw "packaged e2e failed (exit $($p.ExitCode))" }

      - name: Package & publish installers
        # Only reached when the packaged-app E2E passed. electron-builder
        # targets the host platform: macOS runner -> dmg/zip (arm64 + x64),
        # Windows runner -> nsis. Unsigned (identity is null and CSC
        # auto-discovery is disabled).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: pnpm exec electron-builder --publish always
